<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRK POKER | Premium Download</title>
    <style>
        :root {
            --bg-dark: #050505;
            --gold-primary: #d4af37;
            --gold-bright: #f9e498;
            --gold-dark: #b8860b;
            --gold-gradient: linear-gradient(135deg, #d4af37 0%, #f9e498 50%, #b8860b 100%);
            --silver-gradient: linear-gradient(135deg, #bdc3c7 0%, #ffffff 50%, #7f8c8d 100%);
            /* Градієнт для золотого переливу кнопки клубу */
            --gold-shimmer: linear-gradient(90deg, #b8860b, #f9e498, #d4af37, #f9e498, #b8860b);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at center, rgba(20, 20, 25, 0.7) 0%, rgba(5, 5, 5, 1) 100%),
                url('https://www.transparenttextures.com/patterns/circuit-board.png');
            color: white;
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Анімовані проводи */
        .wires-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
            opacity: 0.35;
        }

        .wire {
            fill: none;
            stroke: var(--gold-primary);
            stroke-width: 1.2;
            stroke-linecap: round;
            filter: drop-shadow(0 0 3px var(--gold-dark));
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            animation: flowWire 10s linear infinite;
        }

        @keyframes flowWire {
            0% { stroke-dashoffset: 2000; opacity: 0.1; }
            50% { opacity: 0.4; }
            100% { stroke-dashoffset: 0; opacity: 0.1; }
        }

        .wire-glow {
            stroke: var(--gold-bright);
            stroke-width: 2;
            filter: blur(1.5px);
            animation: glowPath 5s ease-in-out infinite;
        }

        @keyframes glowPath {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 0.8; stroke-width: 2.5; }
        }

        .container {
            position: relative;
            text-align: center;
            padding: 35px;
            max-width: 420px;
            width: 90%;
            z-index: 2;
            background: rgba(5, 5, 5, 0.6);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(212, 175, 55, 0.1);
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            margin-bottom: 40px; 
        }

        .logo-main {
            font-size: 72px;
            font-weight: 900;
            line-height: 0.8;
            text-transform: uppercase;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
            filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.6));
        }

        .logo-sub {
            font-size: 42px;
            font-weight: 700;
            letter-spacing: 4px;
            background: var(--silver-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        .separator {
            width: 60px;
            height: 2px;
            background: var(--gold-gradient);
            margin: 15px auto;
            box-shadow: 0 0 10px var(--gold-primary);
        }

        .tagline {
            color: #888;
            font-size: 10px;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 25px;
        }

        .download-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
        }

        /* Базовий стиль всіх кнопок */
        .btn-download {
            background: rgba(25, 25, 25, 0.7);
            border: 1px solid rgba(212, 175, 55, 0.15);
            border-radius: 12px;
            padding: 10px 18px;
            display: flex;
            align-items: center;
            text-decoration: none;
            color: white;
            transition: all 0.3s ease;
        }

        /* Ховер для стандартних кнопок (залишається темним, як було) */
        .btn-download:hover {
            border-color: var(--gold-primary);
            transform: translateY(-2px);
            background: rgba(35, 35, 35, 0.9);
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.1);
        }

        /* СПЕЦІАЛЬНИЙ СТИЛЬ ДЛЯ КНОПКИ КЛУБУ (ЗОЛОТИЙ ПЕРЕЛИВ) */
        .btn-club {
            background: var(--gold-shimmer);
            background-size: 400% 400%;
            border: none;
            margin-bottom: 10px;
            justify-content: center;
            animation: goldFlow 6s ease infinite;
        }

        .btn-club .btn-text strong {
            color: #000 !important;
            font-weight: 800;
            font-size: 18px;
        }

        /* Ховер для кнопки клубу - щоб не ставала чорною */
        .btn-club:hover {
            background: var(--gold-shimmer) !important;
            background-size: 200% 200% !important;
            animation: goldFlow 1.5s linear infinite !important;
            filter: brightness(1.2);
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.5);
        }

        @keyframes goldFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .btn-icon {
            width: 26px;
            height: 26px;
            margin-right: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-icon img {
            width: 100%;
            height: auto;
        }

        .btn-text { text-align: left; }
        .btn-text span {
            display: block;
            font-size: 9px;
            color: #888;
            text-transform: uppercase;
        }
        .btn-text strong {
            display: block;
            font-size: 16px;
            font-weight: 600;
        }

        .btn-tg {
            margin-top: 5px;
            border: 1px dashed rgba(212, 175, 55, 0.3);
        }

        .disclaimer {
            position: absolute;
            bottom: 20px;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 11px;
            color: #555;
            padding: 0 20px;
            box-sizing: border-box;
            font-style: italic;
            z-index: 2;
        }
    </style>
</head>
